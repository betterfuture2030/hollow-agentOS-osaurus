<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hollow Operator Panel</title>
<style>
  :root {
    --bg: #101418; --card: #1a2027; --edge: #2a333d; --text: #d7dee6;
    --dim: #8595a5; --good: #4caf7d; --warn: #e0b341; --bad: #e05d5d;
    --c-scout: #4dc9d9; --c-analyst: #b48be0; --c-builder: #e0a343;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "SF Mono", Menlo, monospace;
    padding: 14px 16px 54px; display: flex; flex-direction: column; gap: 10px;
    position: relative; overflow: hidden;
  }
  /* ==== the sky: weather happens to the whole panel ===================== */
  #sky { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0;
         transition: opacity 3s; }
  body.wx #sky { opacity: 1; }
  body.wx-fog #sky { background:
      radial-gradient(ellipse 80% 50% at 30% 20%, #aebccb22, transparent 70%),
      radial-gradient(ellipse 70% 45% at 75% 60%, #aebccb1c, transparent 70%);
    animation: fogdrift 24s ease-in-out infinite alternate; }
  @keyframes fogdrift { from { transform: translateX(-3%); } to { transform: translateX(3%); } }
  body.wx-rain #sky { background: repeating-linear-gradient(
      115deg, transparent 0 14px, #7fa8c92a 14px 15px, transparent 15px 30px);
    animation: rainfall 1.1s linear infinite; }
  @keyframes rainfall { from { background-position: 0 0; } to { background-position: -46px 90px; } }
  body.wx-heat #sky { background: linear-gradient(180deg, #e0743415, transparent 55%);
    animation: shimmer 5s ease-in-out infinite alternate; backdrop-filter: blur(.4px); }
  @keyframes shimmer { from { transform: skewX(.35deg) scaleY(1); }
                       to   { transform: skewX(-.35deg) scaleY(1.008); } }
  body.wx-amber #sky { background: linear-gradient(160deg, #e0a34320, transparent 65%); }
  body.wx-silence #sky { background: #0a0d1080; backdrop-filter: saturate(.55); }
  body.wx-wind #sky::after { content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(circle 1.5px, #d7dee655 99%, transparent),
                      radial-gradient(circle 1px, #d7dee63d 99%, transparent);
    background-size: 340px 180px, 210px 140px;
    animation: windblow 9s linear infinite; }
  @keyframes windblow { from { background-position: 0 0, 0 0; }
                        to { background-position: 680px -40px, 420px -20px; } }
  body.wx-object #sky::after { content: "✦"; position: absolute; top: 12px; right: 240px;
    color: var(--warn); animation: glint 2.2s ease-in-out infinite; }
  @keyframes glint { 0%,100% { opacity: .15; text-shadow: none; }
                     50% { opacity: 1; text-shadow: 0 0 12px var(--warn); } }
  body.wx-echo #sky::after { content: ""; position: absolute; top: 40%; left: 50%;
    width: 20px; height: 20px; border: 1px solid var(--dim); border-radius: 50%;
    animation: ripple 6s ease-out infinite; }
  @keyframes ripple { from { transform: translate(-50%,-50%) scale(1); opacity: .6; }
                      to   { transform: translate(-50%,-50%) scale(30); opacity: 0; } }
  #topbar, #agents, #shelfwrap, #ruleswrap, #peers, #streamwrap { position: relative; z-index: 1; }
  /* ==== header =========================================================== */
  #topbar { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  h1 { font-size: 18px; letter-spacing: 2px; }
  h1 small { color: var(--dim); font-weight: normal; letter-spacing: 0; margin-left: 8px; }
  #conn { font-size: 11px; }
  #tally { font-size: 11px; color: var(--dim); }
  #spacer { flex: 1; }
  #worlddial { display: flex; align-items: center; gap: 7px; cursor: default; }
  #worlddial .lbl { font-size: 10px; color: var(--dim); text-align: right; line-height: 1.3; }
  button { background: #232c36; color: var(--text); border: 1px solid var(--edge);
           border-radius: 5px; padding: 4px 10px; cursor: pointer; font: inherit; font-size: 12px; }
  button:hover { border-color: var(--dim); }
  button.danger { color: var(--bad); }
  /* ==== agent cards ====================================================== */
  #agents { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex-shrink: 0; }
  @media (max-width: 980px) { #agents { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--edge); border-top: 3px solid var(--ac);
          border-radius: 8px; padding: 12px 14px; position: relative;
          transition: box-shadow .5s, opacity .3s; }
  .card.suspended { opacity: .45; }
  .card.suspended::after { content: "⏸"; position: absolute; top: 8px; right: 12px; font-size: 20px; }
  .card.celebrate { box-shadow: 0 0 22px 2px var(--good); }
  .card.thinking { animation: breathe 2.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { box-shadow: 0 0 3px 0 var(--ac); }
                       50% { box-shadow: 0 0 16px 1px var(--ac); } }
  .card h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 2px;
             display: flex; align-items: center; gap: 8px; color: var(--ac); }
  .tier { font-size: 10px; padding: 1px 8px; border-radius: 9px; border: 1px solid var(--edge); color: var(--good); }
  .tier.CONSTRAINED { color: var(--warn); } .tier.DOMINANT { color: var(--bad); }
  .meta { color: var(--dim); font-size: 11px; }
  .gauge { margin-left: 2px; }
  .dots { margin-left: auto; letter-spacing: 2px; font-size: 10px; }
  .badge { font-size: 11px; color: var(--warn); display: none; }
  .badge.on { display: inline; animation: glint 2.5s infinite; }
  .thinkline { font-size: 10px; color: var(--ac); min-height: 14px; }
  .loadwrap { position: relative; height: 7px; background: #0b0e11; border-radius: 4px; margin: 7px 0 3px; }
  .loadwrap .fill { position: absolute; inset: 0 auto 0 0; border-radius: 4px;
    background: linear-gradient(90deg, var(--good), var(--warn) 60%, var(--bad)); transition: width .4s; }
  .loadwrap .tick { position: absolute; top: -2px; bottom: -2px; width: 1px; background: var(--dim); opacity: .6; }
  .spark { display: block; width: 100%; height: 24px; margin: 0 0 5px; }
  .goal { color: var(--dim); font-size: 12px; margin-bottom: 4px; }
  .goal b { color: var(--text); }
  .scars { color: var(--bad); letter-spacing: 2px; }
  .thought { font-style: italic; font-size: 12px; color: var(--text); opacity: .85;
             border-left: 2px solid var(--ac); padding-left: 8px; margin: 6px 0;
             max-height: 100px; overflow-y: auto; }
  .thought:empty { display: none; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; }
  input[type=text] { flex: 1; background: #0b0e11; border: 1px solid var(--edge); border-radius: 5px;
                     color: var(--text); padding: 4px 8px; font: inherit; font-size: 12px; }
  details summary { color: var(--dim); font-size: 11px; cursor: pointer; user-select: none; }
  .stressor { display: grid; grid-template-columns: 118px 1fr 34px; align-items: center; gap: 8px;
              font-size: 11px; color: var(--dim); margin-top: 4px; }
  input[type=range] { width: 100%; accent-color: var(--warn); }
  .spark, .gauge { pointer-events: none; }
  /* fireworks / ash */
  .pop { position: absolute; width: 5px; height: 5px; border-radius: 50%; pointer-events: none;
         animation: pop 1.1s ease-out forwards; z-index: 5; }
  @keyframes pop { from { opacity: 1; transform: translate(0,0) scale(1); }
                   to { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.3); } }
  /* ==== shelf & rules ==================================================== */
  #shelfwrap, #ruleswrap { flex-shrink: 0; }
  #shelfwrap summary, #ruleswrap summary { color: var(--dim); font-size: 11px;
     letter-spacing: 2px; cursor: pointer; padding: 2px 4px; }
  #shelf { display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px; }
  .book { flex: 0 0 auto; background: var(--card); border: 1px solid var(--edge);
          border-left: 3px solid var(--dim); border-radius: 6px; padding: 6px 10px;
          font-size: 11px; cursor: pointer; max-width: 200px; }
  .book:hover { border-color: var(--text); }
  .book .nm { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .book .by { color: var(--dim); font-size: 10px; }
  .book.fresh { box-shadow: 0 0 10px 0 var(--warn); }
  #rules { display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px; }
  .tablet { flex: 0 0 auto; max-width: 300px; background: #161b22;
            border: 1px solid var(--edge); border-radius: 6px 6px 10px 10px;
            padding: 7px 11px; font-size: 11px; color: var(--dim); font-style: italic; }
  .tablet .cat { color: var(--warn); font-style: normal; font-size: 9px; letter-spacing: 1px; }
  .tablet.fresh { box-shadow: 0 0 12px 0 var(--good); color: var(--text); }
  /* ==== peer graph ======================================================= */
  #peers { flex-shrink: 0; display: flex; align-items: center; gap: 14px;
           background: var(--card); border: 1px solid var(--edge); border-radius: 8px;
           padding: 4px 16px; font-size: 11px; color: var(--dim); }
  #peers svg { width: 100%; height: 84px; }
  #peers .flow { stroke-dasharray: 7 5; animation: flow 1.4s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -12; } }
  #peers .pulse { animation: edgepulse .9s ease-out; }
  @keyframes edgepulse { from { stroke-opacity: 1; stroke-width: 6; } }
  /* ==== event stream ===================================================== */
  #streamwrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #streambar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
  #streambar h2 { font-size: 13px; letter-spacing: 2px; color: var(--dim); margin-right: 8px; }
  .chip { font-size: 11px; padding: 2px 10px; border-radius: 10px; }
  .chip.on { border-color: var(--text); color: var(--text); }
  #feed { flex: 1; background: var(--card); border: 1px solid var(--edge); border-radius: 8px;
          padding: 10px 14px; overflow-y: auto; font-size: 12.5px; min-height: 0; }
  .ev { padding: 3px 0 3px 10px; border-bottom: 1px solid #151a20; border-left: 3px solid transparent;
        white-space: pre-wrap; word-break: break-word; }
  .ev.band { background: #ffffff06; }
  .ev .t { color: var(--dim); } .ev .who { font-weight: bold; } .ev .k { color: var(--dim); }
  .cyc { font-size: 9px; border: 1px solid var(--edge); border-radius: 8px; padding: 0 5px;
         color: var(--dim); vertical-align: 1px; }
  .ev.thought { font-style: italic; }
  .ev.goal .d { font-weight: bold; }
  .ev.done { animation: glow 2.5s ease-out; }
  .ev.done .d { color: var(--good); font-weight: bold; }
  .ev.dead .d { color: var(--bad); }
  .ev.world { border-left: none; text-align: center; font-style: italic; color: var(--dim); padding: 8px 0; }
  .ev.control { opacity: .55; }
  .ev.cyclemark { color: var(--dim); font-size: 10px; text-align: center; padding: 1px 0;
                  border-bottom: 1px dashed var(--edge); }
  @keyframes glow { from { background: rgba(76,175,125,.25); } to { background: transparent; } }
  #jump { position: fixed; bottom: 58px; right: 34px; display: none; box-shadow: 0 2px 12px #0009; z-index: 6; }
  /* ==== ticker =========================================================== */
  #ticker { position: fixed; left: 0; right: 0; bottom: 0; height: 34px; z-index: 4;
            background: #0b0e11f2; border-top: 1px solid var(--edge);
            display: flex; align-items: center; overflow: hidden; }
  #tickertrack { display: inline-flex; gap: 60px; white-space: nowrap; will-change: transform;
                 animation: tick 60s linear infinite; padding-left: 100%; }
  #ticker:hover #tickertrack { animation-play-state: paused; }
  @keyframes tick { to { transform: translateX(-100%); } }
  #tickertrack span { font-size: 12px; color: var(--dim); cursor: pointer; }
  #tickertrack b { letter-spacing: 1px; }
  /* ==== viewer =========================================================== */
  #viewer { position: fixed; inset: 0; background: #000a; display: none;
            align-items: center; justify-content: center; z-index: 10; }
  #viewer .box { background: var(--card); border: 1px solid var(--edge); border-radius: 10px;
                 width: min(860px, 92vw); max-height: 84vh; display: flex; flex-direction: column; }
  #viewer .box h3 { padding: 10px 16px; border-bottom: 1px solid var(--edge);
                    font-size: 13px; color: var(--warn); display: flex; justify-content: space-between; }
  #viewer pre { padding: 14px 16px; overflow: auto; white-space: pre-wrap;
                word-break: break-word; font-size: 12.5px; line-height: 1.55; }
  .filelink { color: var(--warn); text-decoration: underline dotted; cursor: pointer; }
</style>
</head>
<body>
<div id="sky"></div>
<div id="topbar">
  <h1>HOLLOW <small>operator panel</small> <span id="conn">…</span></h1>
  <span id="tally"></span>
  <span id="spacer"></span>
  <div id="worlddial" title="">
    <div class="lbl" id="diallbl">the world<br>is quiet</div>
    <svg width="38" height="38" viewBox="0 0 38 38">
      <circle cx="19" cy="19" r="16" fill="none" stroke="var(--edge)" stroke-width="3"/>
      <circle id="dialarc" cx="19" cy="19" r="16" fill="none" stroke="var(--warn)" stroke-width="3"
              stroke-linecap="round" stroke-dasharray="100.5" stroke-dashoffset="100.5"
              transform="rotate(-90 19 19)"/>
      <text id="dialglyph" x="19" y="24" text-anchor="middle" font-size="13">🌍</text>
    </svg>
  </div>
  <button onclick="provoke()" title="draw an ambient world event right now">🌩 provoke</button>
  <button class="danger" onclick="nuke()">☢ nuke</button>
</div>
<div id="agents"></div>
<details id="shelfwrap" open><summary>THE COMMONS — shared artifacts</summary><div id="shelf"></div></details>
<details id="ruleswrap"><summary>RULES OF THE WORLD — promoted lessons</summary><div id="rules"></div></details>
<div id="peers"><span>PEER<br>READS</span><svg id="peersvg" viewBox="0 0 1000 84" preserveAspectRatio="xMidYMid meet"></svg></div>
<div id="streamwrap">
  <div id="streambar">
    <h2>EVENT STREAM</h2>
    <button class="chip on" data-f="all">all</button>
    <button class="chip" data-f="thought">thoughts</button>
    <button class="chip" data-f="goal">goals</button>
    <button class="chip" data-f="capability">capabilities</button>
    <button class="chip" data-f="ambient">world</button>
    <button class="chip" data-f="control">control</button>
  </div>
  <div id="feed"></div>
</div>
<button id="jump" onclick="jumpLive()">↓ live</button>
<div id="ticker"><div id="tickertrack"></div></div>
<div id="viewer" onclick="if(event.target===this)this.style.display='none'">
  <div class="box">
    <h3><span id="vpath"></span><span class="filelink" onclick="document.getElementById('viewer').style.display='none'">✕ close</span></h3>
    <pre id="vbody"></pre>
  </div>
</div>

<script>
const STRESSORS = ["futility","invisibility","identity_violation","existential_threat",
  "repeated_failure","purposelessness","resource_burden","capability_lock","stagnation"];
const AGENTS = ["scout","analyst","builder"];
const GOAL_KINDS = new Set(["goal","goal_completed","goal_abandoned"]);
const FLAVOR_GLYPH = {wind:"🌬", fog:"🌫", rain:"🌧", amber:"🌇", silence:"🤫",
                      heat:"🌡", object:"🗝", echo:"🌀"};
let dragging = null, filter = "all", follow = true, celebrated = new Set(), mourned = new Set();
let lastEvents = [], prevPeerCounts = {}, lastAmbientT = 0, knownLessons = new Set(),
    knownBooks = new Set(), typeTimers = {}, titleFlashUntil = 0, firstLoad = true;

const el = id => document.getElementById(id);
async function api(path, body){
  const r = await fetch(path, body ? {method:"POST", body: JSON.stringify(body)} : {});
  return r.json();
}
function escapeHtml(t){ const d=document.createElement("div"); d.textContent=t; return d.innerHTML; }
function linkify(escaped, agent){
  return escaped.replace(/(?:[\w.-]+\/)*[\w.-]+\.(?:md|json|py|txt)\b/g, m => {
    const full = m.startsWith("shared/") || AGENTS.some(a => m.startsWith(a + "/"))
      ? m : `${agent}/${m}`;
    return `<span class="filelink" onclick="openFile('${full.replace(/'/g,"")}')">${m}</span>`;
  });
}

function card(agent){
  const sliders = STRESSORS.map(k => `
    <div class="stressor">
      <span>${k}</span>
      <input type="range" min="0" max="1" step="0.05" value="0" id="sl-${agent}-${k}"
        onpointerdown="dragging='${agent}/${k}'" onpointerup="dragging=null"
        onchange="setStressor('${agent}','${k}',this.value)">
      <span id="sv-${agent}-${k}">0</span>
    </div>`).join("");
  return `
  <div class="card" id="card-${agent}" style="--ac: var(--c-${agent})">
    <h2>${agent}
      <svg class="gauge" id="gauge-${agent}" width="44" height="26" viewBox="0 0 44 26"></svg>
      <span class="tier" id="tier-${agent}">–</span>
      <span class="meta" id="cyc-${agent}"></span>
      <span class="badge" id="badge-${agent}" title="pending Claude bridge requests">✉</span>
      <span class="dots" id="dots-${agent}"></span>
    </h2>
    <div class="thinkline" id="think-${agent}"></div>
    <div class="loadwrap">
      <div class="fill" id="load-${agent}" style="width:0%"></div>
      <div class="tick" style="left:55%"></div><div class="tick" style="left:75%"></div>
    </div>
    <svg class="spark" id="spark-${agent}" viewBox="0 0 200 24" preserveAspectRatio="none"></svg>
    <div class="goal" id="goal-${agent}">…</div>
    <div class="thought" id="th-${agent}"></div>
    <div class="row">
      <button id="btn-sus-${agent}" onclick="toggleSuspend('${agent}')">suspend</button>
      <input type="text" id="msg-${agent}" placeholder="message from the host…"
             onkeydown="if(event.key==='Enter')inject('${agent}')">
      <button onclick="inject('${agent}')">inject</button>
    </div>
    <details><summary>stressors (drag to set — suffering injection)</summary>${sliders}</details>
  </div>`;
}
el("agents").innerHTML = AGENTS.map(card).join("");

document.querySelectorAll(".chip").forEach(c => c.onclick = () => {
  filter = c.dataset.f;
  document.querySelectorAll(".chip").forEach(x => x.classList.toggle("on", x === c));
  renderFeed(lastEvents);
});

const OUTCOME_GLYPH = {success:"🟢", failure:"🔴", idle:"⚪"};
let suspended = {};

async function refresh(){
  try {
    const s = await api("/state");
    el("conn").textContent = "● live"; el("conn").style.color = "var(--good)";
    let total = 0, loads = [];
    const act = s._activity;
    for (const a of AGENTS){
      const st = s[a]; if (!st) continue;
      total += st.completions || 0;
      loads.push(st.suffering.load);
      el("tier-"+a).textContent = st.suffering.tier;
      el("tier-"+a).className = "tier " + st.suffering.tier;
      el("cyc-"+a).textContent = "cycle " + st.cycle;
      el("load-"+a).style.width = (st.suffering.load*100) + "%";
      el("dots-"+a).textContent = (st.recent_outcomes||[]).map(o => OUTCOME_GLYPH[o]||"⚪").join("");
      el("badge-"+a).classList.toggle("on", (st.claude_pending||0) > 0);
      drawSpark(a, st.load_history || []);
      drawGauge(a, st.suffering.load);
      el("card-"+a).classList.toggle("suspended", st.suspended);
      el("btn-sus-"+a).textContent = st.suspended ? "resume" : "suspend";
      suspended[a] = st.suspended;
      const g = st.active_goal;
      const scars = g && g.validation_failures
        ? ` <span class="scars">${"✗".repeat(Math.min(5, g.validation_failures))}</span>` : "";
      el("goal-"+a).innerHTML = g
        ? `<b>${escapeHtml(g.title)}</b> — ${(g.progress*100).toFixed(0)}%${scars}`
        : "<i>no active goal</i>";
      typewrite(a, st.last_thought || "");
      const thinking = act && act.agent === a;
      el("card-"+a).classList.toggle("thinking", !!thinking);
      el("think-"+a).textContent = thinking
        ? `thinking… ${Math.max(0, Math.round(Date.now()/1000 - act.since))}s` : "";
      for (const k of STRESSORS){
        const sev = (st.suffering.stressors[k] || {severity:0}).severity;
        el("sv-"+a+"-"+k).textContent = sev ? sev.toFixed(2).replace(/0+$/,"").replace(/\.$/,"") : "0";
        if (dragging !== a+"/"+k) el("sl-"+a+"-"+k).value = sev;
      }
    }
    el("tally").textContent = total ? `⚑ ${total} goals completed` : "";
    updateWorld(s._world);
    updateTicker(s);
    if (Date.now() > titleFlashUntil)
      document.title = `◉ ${loads.map(l => l.toFixed(1).replace("0.",".")).join("·")} ⚑${total} — Hollow`;
    lastEvents = await api("/events?n=140");
    renderFeed(lastEvents);
    drawPeers(await api("/peergraph"));
    refreshShelfAndRules();
    firstLoad = false;
  } catch (err) {
    el("conn").textContent = "○ unreachable"; el("conn").style.color = "var(--bad)";
  }
}

/* ---- typewriter thoughts ---- */
function typewrite(agent, text){
  const node = el("th-"+agent);
  if (node.dataset.full === text) return;
  node.dataset.full = text;
  clearInterval(typeTimers[agent]);
  if (firstLoad || !text){ node.textContent = text; return; }
  let i = 0;
  node.textContent = "";
  typeTimers[agent] = setInterval(() => {
    i += 3;
    node.textContent = text.slice(0, i);
    if (i >= text.length) clearInterval(typeTimers[agent]);
  }, 30);
}

/* ---- gauges, sparklines ---- */
function drawGauge(agent, load){
  const svg = el("gauge-"+agent);
  const arc = (from, to, color) => {
    const a1 = Math.PI * (1 - from), a2 = Math.PI * (1 - to);
    const x1 = 22 + 17*Math.cos(a1), y1 = 23 - 17*Math.sin(a1);
    const x2 = 22 + 17*Math.cos(a2), y2 = 23 - 17*Math.sin(a2);
    return `<path d="M ${x1} ${y1} A 17 17 0 0 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="3.5" stroke-opacity=".45"/>`;
  };
  const na = Math.PI * (1 - Math.min(1, load));
  const nx = 22 + 14*Math.cos(na), ny = 23 - 14*Math.sin(na);
  svg.innerHTML =
    arc(0, .55, "var(--good)") + arc(.55, .75, "var(--warn)") + arc(.75, 1, "var(--bad)") +
    `<line x1="22" y1="23" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="1.6"/>` +
    `<circle cx="22" cy="23" r="1.8" fill="var(--text)"/>`;
}
function drawSpark(agent, hist){
  const svg = el("spark-"+agent);
  if (!hist.length){ svg.innerHTML = ""; return; }
  const n = hist.length, w = 200, h = 24, pad = 2;
  const x = i => n === 1 ? w/2 : pad + i * (w - 2*pad) / (n - 1);
  const y = v => h - pad - v * (h - 2*pad);
  const pts = hist.map((v,i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  svg.innerHTML =
    `<line x1="0" y1="${y(0.75)}" x2="${w}" y2="${y(0.75)}" stroke="var(--bad)" stroke-opacity=".35" stroke-dasharray="3,3"/>` +
    `<polyline points="${pts}" fill="none" stroke="var(--c-${agent})" stroke-width="1.6"/>` +
    `<circle cx="${x(n-1)}" cy="${y(hist[n-1])}" r="2.2" fill="var(--c-${agent})"/>`;
}

/* ---- world dial + sky ---- */
function updateWorld(w){
  const amb = w && w.last_ambient;
  if (!amb || !amb.t){ el("diallbl").innerHTML = "the world<br>is quiet"; return; }
  const mins = (Date.now()/1000 - amb.t) / 60;
  const frac = Math.min(1, mins / 30);
  el("dialarc").style.strokeDashoffset = (100.5 * (1 - frac)).toFixed(1);
  el("dialglyph").textContent = FLAVOR_GLYPH[amb.flavor] || "🌍";
  el("diallbl").innerHTML = mins < 1 ? "the world<br>just spoke"
    : `world spoke<br>${Math.round(mins)}m ago`;
  el("worlddial").title = amb.text;
  if (amb.t !== lastAmbientT){
    lastAmbientT = amb.t;
    document.body.className = "wx wx-" + (amb.flavor || "fog");
    setTimeout(() => { if (lastAmbientT === amb.t) document.body.className = ""; }, 60000);
  }
}

/* ---- ticker ---- */
function updateTicker(s){
  const segs = AGENTS.map(a => {
    const t = (s[a] && s[a].last_thought) || "";
    return t ? `<span onclick="el('card-${a}').scrollIntoView({behavior:'smooth'})">` +
      `<b style="color:var(--c-${a})">${a.toUpperCase()}</b> ▸ ${escapeHtml(t)}</span>` : "";
  }).filter(Boolean).join("");
  const track = el("tickertrack");
  if (track.dataset.content !== segs){
    track.dataset.content = segs;
    track.innerHTML = segs || "<span>the habitat is waking…</span>";
  }
}

/* ---- shelf + rules (lighter cadence) ---- */
let shelfTick = 0;
async function refreshShelfAndRules(){
  if (shelfTick++ % 5) return;  // every ~10s
  const books = await api("/artifacts");
  el("shelf").innerHTML = books.map(b => {
    const fresh = !knownBooks.has(b.path) && !firstLoad && knownBooks.size > 0;
    const cls = fresh ? "book fresh" : "book";
    const edge = b.author ? `style="border-left-color:var(--c-${b.author})"` : "";
    return `<div class="${cls}" ${edge} onclick="openFile('${b.path}')">` +
      `<div class="nm">${escapeHtml(b.name)}</div>` +
      `<div class="by">${b.author || "unknown"} · ${(b.size/1024).toFixed(1)}k</div></div>`;
  }).join("") || "<span style='color:var(--dim);font-size:11px'>nothing shared yet</span>";
  books.forEach(b => knownBooks.add(b.path));
  const rules = await api("/lessons");
  el("rules").innerHTML = rules.map(l => {
    const fresh = !knownLessons.has(l.text) && !firstLoad && knownLessons.size > 0;
    return `<div class="tablet${fresh ? " fresh" : ""}">` +
      `<div class="cat">${escapeHtml(l.category || "")}</div>${escapeHtml(l.text)}</div>`;
  }).join("") || "<span style='color:var(--dim);font-size:11px'>no rules learned yet</span>";
  rules.forEach(l => knownLessons.add(l.text));
  el("ruleswrap").querySelector("summary").textContent =
    `RULES OF THE WORLD — ${rules.length} promoted lesson${rules.length===1?"":"s"}`;
}

/* ---- peer graph v2 ---- */
function drawPeers(counts){
  const pos = {scout: 130, analyst: 500, builder: 870};
  const received = {scout: 0, analyst: 0, builder: 0};
  for (const [key, n] of Object.entries(counts || {})){
    const to = key.split("->")[1];
    if (to in received) received[to] += n;
  }
  let edges = "";
  for (const [key, n] of Object.entries(counts || {})){
    const [from, to] = key.split("->");
    if (!(from in pos) || !(to in pos)) continue;
    const x1 = pos[from], x2 = pos[to];
    const up = x1 < x2 ? -1 : 1;
    const mid = (x1 + x2) / 2, cy = 42 + up * 30;
    const wdt = Math.min(5, 1 + n * 0.25);
    const pulse = prevPeerCounts[key] !== undefined && counts[key] > prevPeerCounts[key] ? " pulse" : "";
    edges += `<path class="flow${pulse}" d="M ${x1} 42 Q ${mid} ${cy} ${x2} 42" fill="none" ` +
      `stroke="var(--c-${from})" stroke-width="${wdt}" stroke-opacity=".65" marker-end="url(#arr-${from})"/>` +
      `<rect x="${mid-14}" y="${42 + up*22 - 9}" width="28" height="13" rx="6" fill="var(--card)"/>` +
      `<text x="${mid}" y="${42 + up*22 + 1}" fill="var(--c-${from})" font-size="10" text-anchor="middle">${n}</text>`;
  }
  const defs = AGENTS.map(a =>
    `<marker id="arr-${a}" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="4.5" markerHeight="4.5" orient="auto">` +
    `<path d="M0,0 L6,3 L0,6 z" fill="var(--c-${a})"/></marker>`).join("");
  const nodes = AGENTS.map(a => {
    const r = 5 + Math.min(7, Math.sqrt(received[a] || 0));
    return `<circle cx="${pos[a]}" cy="42" r="${r}" fill="var(--c-${a})" fill-opacity=".9"/>` +
      `<text x="${pos[a]}" y="${42 - r - 6}" fill="var(--c-${a})" font-size="12" letter-spacing="2" text-anchor="middle">${a.toUpperCase()}</text>`;
  }).join("");
  el("peersvg").innerHTML = `<defs>${defs}</defs>${edges}${nodes}`;
  prevPeerCounts = counts || {};
}

/* ---- event stream ---- */
function evClass(e){
  let cls = "ev";
  if (e.kind === "goal_completed") cls = "ev done";
  else if (e.kind === "goal_abandoned") cls = "ev dead";
  else if (e.kind === "ambient") return "ev world";
  else if (GOAL_KINDS.has(e.kind)) cls = "ev goal";
  else if (e.kind === "thought") cls = "ev thought";
  else if (e.kind === "control") cls = "ev control";
  if (e.cycle !== undefined && e.cycle % 2 === 0) cls += " band";
  return cls;
}
function matches(e){
  if (filter === "all") return true;
  if (filter === "goal") return GOAL_KINDS.has(e.kind);
  return e.kind === filter;
}
function renderFeed(events){
  const feed = el("feed");
  const html = events.filter(matches).map(e => {
    const color = AGENTS.includes(e.agent) ? `var(--c-${e.agent})` : "var(--dim)";
    if (e.kind === "ambient")
      return `<div class="ev world">🌫 ${escapeHtml(e.detail||"")}</div>`;
    if (e.kind === "cycle" && /begins$/.test(e.detail||""))
      return `<div class="ev cyclemark" style="color:${color}">— ${e.agent} · ${escapeHtml(e.detail)} —</div>`;
    const gutter = e.kind === "thought" ? "💭 " : "";
    const chip = e.cycle !== undefined
      ? `<span class="cyc" style="color:${color};border-color:${color}">c${e.cycle}</span> ` : "";
    return `<div class="${evClass(e)}" style="border-left-color:${color}">` +
      `<span class="t">${(e.ts||"").slice(11,19)}</span> ${chip}` +
      `<span class="who" style="color:${color}">${e.agent}</span> ` +
      `<span class="k">${e.kind}</span> ${gutter}<span class="d">${linkify(escapeHtml(e.detail||""), e.agent)}</span></div>`;
  }).join("");
  feed.innerHTML = html;
  for (const e of events){
    if (e.kind === "goal_completed" && !celebrated.has(e.t)){
      celebrated.add(e.t);
      if (!firstLoad){
        fireworks(e.agent);
        document.title = "✦ " + e.agent + " completed a goal! — Hollow";
        titleFlashUntil = Date.now() + 30000;
      }
      const c = el("card-"+e.agent);
      if (c && !firstLoad){ c.classList.add("celebrate"); setTimeout(() => c.classList.remove("celebrate"), 2500); }
    }
    if (e.kind === "goal_abandoned" && !mourned.has(e.t)){
      mourned.add(e.t);
      if (!firstLoad) ash(e.agent);
    }
  }
  if (follow) feed.scrollTop = feed.scrollHeight;
}
el("feed").addEventListener("scroll", () => {
  const f = el("feed");
  follow = f.scrollTop + f.clientHeight >= f.scrollHeight - 30;
  el("jump").style.display = follow ? "none" : "block";
});
function jumpLive(){ follow = true; el("feed").scrollTop = el("feed").scrollHeight; el("jump").style.display = "none"; }

/* ---- fireworks & ash ---- */
function particles(agent, colors, dyRange){
  const c = el("card-"+agent); if (!c) return;
  const r = c.getBoundingClientRect();
  for (let i = 0; i < 14; i++){
    const p = document.createElement("div");
    p.className = "pop";
    p.style.left = (r.left + r.width/2) + "px";
    p.style.top = (r.top + r.height/2) + "px";
    p.style.background = colors[i % colors.length];
    p.style.setProperty("--dx", (Math.random()*160 - 80).toFixed(0) + "px");
    p.style.setProperty("--dy", (dyRange[0] + Math.random()*(dyRange[1]-dyRange[0])).toFixed(0) + "px");
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}
const fireworks = a => particles(a, ["var(--good)", "var(--warn)", `var(--c-${a})`], [-140, -30]);
const ash = a => particles(a, ["#555e68", "#3a424c"], [40, 130]);

/* ---- viewer / actions ---- */
async function openFile(path){
  const r = await api("/file?path=" + encodeURIComponent(path));
  el("vpath").textContent = r.path || path;
  el("vbody").textContent = r.content !== undefined ? r.content : (r.error || "unreadable");
  el("viewer").style.display = "flex";
}
async function toggleSuspend(a){ await api(suspended[a] ? "/resume" : "/suspend", {agent:a}); refresh(); }
async function inject(a){
  const box = el("msg-"+a); const m = box.value.trim(); if (!m) return;
  await api("/inject", {agent:a, message:m}); box.value = ""; refresh();
}
async function setStressor(a,k,v){ await api("/stressor", {agent:a, kind:k, severity:parseFloat(v)}); refresh(); }
async function provoke(){ await api("/world", {}); refresh(); }
async function nuke(){
  if (!confirm("Wipe ALL habitat state — goals, lessons, artifacts, suffering?")) return;
  if (!confirm("This cannot be undone. The agents wake in an empty world. Really nuke?")) return;
  await api("/nuke", {confirm:true}); refresh();
}
refresh();
setInterval(refresh, 2000);
